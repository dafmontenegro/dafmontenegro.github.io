<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>404 Page not found</title>
    <meta name="author" content="Daniel Felipe Montenegro">
    <meta name="description" content="404 Page not found">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/p5@1.2.0/lib/p5.min.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
        }
    </style>
</head>

<body>

    <script>
        class Ball {

            constructor() {
                this.x = windowWidth / 2;
                this.y = windowHeight / 2;
                this.movX = random(-11, 12);
                this.movY = random(-11, 12);
                this.size = min(windowWidth, windowHeight) / 21;
                this.randomColor();
            }

            move() {
                fill(ball.color);
                stroke(ball.invColor);
                ellipse(this.x, this.y, this.size);
                this.x += this.movX;
                this.y += this.movY;
                if (this.x > windowWidth - this.size || this.x < this.size) {
                    this.movX *= -1;
                    this.randomColor();
                }
                if (this.y > windowHeight - this.size || this.y < this.size) {
                    this.movY *= -1;
                    this.randomColor();
                }
            }

            randomColor() {
                this.size--;
                if (this.size < 6) {
                    location.href = "https://www.dafmontenegro.com/";
                }
                let r = random(256);
                let g = random(256);
                let b = random(256);
                this.color = color(r, g, b);
                this.invColor = color(255 - r, 255 - g, 255 - b);
            }

        }

        let ball;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            ball = new Ball(32);
            textAlign(CENTER, CENTER);
            textFont('Georgia');
            ellipseMode(RADIUS);
            strokeWeight(3);
            frameRate(30);
        }

        function draw() {
            background(ball.invColor);
            ball.move();
            textSize(ball.size * 12);
            text('404', windowWidth / 2, windowHeight / 2);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>

</body>

</html>
